<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vertriebler-Karte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Vertriebler-Karte</h1>
      <p>PLZ eingeben und nächstgelegenen Berater finden.</p>
    </div>
    <button id="settingsBtn" type="button">Supabase verbinden</button>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Suche</h2>
      <div class="row">
        <input id="searchZip" placeholder="PLZ eingeben, z. B. 50667" />
        <button id="searchBtn">Suchen</button>
      </div>
      <div id="nearestResult" class="result empty">Noch keine Suche gestartet.</div>

      <h2>Vertriebler hinzufügen</h2>
      <p class="hint">Mehrere Zeilen eintragen und dann gemeinsam speichern.</p>
      <textarea id="bulkInput" rows="8" placeholder="Name; PLZ; Ort; Telefon; E-Mail&#10;Max Mustermann; 50667; Köln; 0221 12345; max@example.de"></textarea>
      <button id="saveBulkBtn" class="wide">Alle speichern</button>
      <p id="status" class="status"></p>

      <h2>Vertriebler</h2>
      <div id="advisorList" class="advisor-list"></div>
    </section>

    <section class="map-wrap">
      <div id="map"></div>
    </section>
  </main>

  <dialog id="settingsDialog">
    <form method="dialog" class="settings">
      <h2>Supabase verbinden</h2>
      <p class="hint">Trage Project URL und Publishable/Anon Key ein. Wird nur im Browser gespeichert.</p>
      <label>Project URL<input id="supabaseUrl" placeholder="https://...supabase.co" /></label>
      <label>Publishable / anon key<textarea id="supabaseKey" rows="4"></textarea></label>
      <div class="actions">
        <button id="saveSettingsBtn" type="button">Speichern</button>
        <button type="submit">Schließen</button>
      </div>
    </form>
  </dialog>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
