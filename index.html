<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vertriebler-Karte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQAgN0h4kGLo5Uh2Prh7Oy6E3tBKDg=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Vertriebler-Karte</h1>
    <p>PLZ eingeben und den nächstgelegenen Vertriebler finden.</p>
  </header>

  <main>
    <section class="card search-card">
      <h2>Suche</h2>
      <div class="row">
        <input id="searchPlz" inputmode="numeric" maxlength="5" placeholder="Postleitzahl eingeben, z. B. 50667" />
        <button id="searchBtn">Nächsten finden</button>
      </div>
      <div id="result" class="result muted">Noch keine Suche gestartet.</div>
    </section>

    <section class="map-card">
      <div id="map"></div>
    </section>

    <section class="card">
      <h2>Vertriebler importieren</h2>
      <p class="muted">Aus Excel/Sheets einfach zwei Spalten kopieren: <b>Name</b> und <b>PLZ</b>. Dann hier einfügen.</p>
      <textarea id="bulkInput" rows="8" placeholder="Max Mustermann    48143&#10;Anna Müller       50667&#10;Peter Schulz      80331"></textarea>
      <div class="row actions">
        <button id="importBtn">Alle speichern</button>
        <button id="reloadBtn" class="secondary">Neu laden</button>
      </div>
      <p id="status" class="muted"></p>
    </section>

    <section class="card">
      <h2>Gespeicherte Vertriebler</h2>
      <div id="advisorList" class="list"></div>
    </section>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
